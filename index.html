<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intro to AI — Exam Study Quiz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script src="js/theme.js"></script>
</head>
<body>
<button class="theme-toggle" id="theme-toggle" type="button"></button>
<div class="container">
  <p class="prompt-line">intro-to-ai/</p>
  <h1>Exam Study Quiz</h1>
  <p class="subtitle">Practice questions across data sources, reasoning &amp; knowledge, and types of AI. Pick a topic below or take the full weighted practice test.</p>

  <div class="topic-list">
    <a class="dir-row" href="quiz.html?topic=data-sources"><span class="dir-prefix">&gt;</span> data-sources/</a>
    <a class="dir-row" href="quiz.html?topic=reasoning-knowledge"><span class="dir-prefix">&gt;</span> reasoning-knowledge/</a>
    <a class="dir-row" href="quiz.html?topic=types-of-ai"><span class="dir-prefix">&gt;</span> types-of-ai/</a>
    <a class="dir-row" href="quiz.html?topic=full"><span class="dir-prefix">&gt;</span> full-practice-test/</a>
  </div>

  <h2>Recent Scores</h2>
  <ul class="attempt-list" id="attempt-list"></ul>
</div>

<script src="js/storage.js"></script>
<script>
  const TOPIC_LABELS = {
    'data-sources': 'data-sources',
    'reasoning-knowledge': 'reasoning-knowledge',
    'types-of-ai': 'types-of-ai',
    'full': 'full-practice-test',
  };

  function formatDuration(totalSeconds) {
    const minutes = Math.floor(totalSeconds / 60);
    const seconds = totalSeconds % 60;
    return String(minutes).padStart(2, '0') + ':' + String(seconds).padStart(2, '0');
  }

  function renderAttempts() {
    const list = document.getElementById('attempt-list');
    const attempts = getRecentAttempts(10);

    if (attempts.length === 0) {
      list.innerHTML = '<li class="empty-state">No attempts yet</li>';
      return;
    }

    list.innerHTML = attempts.map((a) => {
      const date = new Date(a.date).toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
      const pct = a.total > 0 ? Math.round((a.score / a.total) * 100) : 0;
      const topicLabel = TOPIC_LABELS[a.topic] || a.topic;
      const timeLabel = typeof a.timeTaken === 'number' ? ` · ${formatDuration(a.timeTaken)}` : '';
      return `<li class="attempt-item">
        <span class="topic">${date} — ${topicLabel}</span>
        <span class="score">${a.score}/${a.total} (${pct}%)${timeLabel}</span>
      </li>`;
    }).join('');
  }

  renderAttempts();
</script>
</body>
</html>
