<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz — Intro to AI Study</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script src="js/theme.js"></script>
</head>
<body>
<button class="theme-toggle" id="theme-toggle" type="button"></button>
<div class="container">
  <div class="quiz-header">
    <button class="exit-btn" id="exit-btn" type="button">&lt; exit quiz</button>
    <div class="header-right">
      <span class="quiz-timer" id="quiz-timer" hidden></span>
      <div class="progress" id="progress"></div>
    </div>
  </div>
  <div id="quiz-area"></div>
</div>

<div class="modal-overlay" id="exit-modal" hidden>
  <div class="modal">
    <p>Exit this quiz? Your progress will <strong>NOT</strong> be saved and this attempt will not appear in your score history.</p>
    <div class="modal-actions">
      <button class="btn secondary" id="exit-cancel" type="button">Cancel</button>
      <button class="btn danger" id="exit-confirm" type="button">Exit Quiz</button>
    </div>
  </div>
</div>

<script src="js/storage.js"></script>
<script src="js/quiz-engine.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const topic = params.get('topic');
  const retryIdsParam = params.get('ids');

  const quizArea = document.getElementById('quiz-area');
  const progressEl = document.getElementById('progress');

  let questions = [];
  let currentIndex = 0;
  let answered = [];
  let selectedIndex = null;
  let quizFinished = false;

  const isFullTest = topic === 'full';
  const LETTERS = ['A', 'B', 'C', 'D', 'E', 'F'];

  const timerEl = document.getElementById('quiz-timer');
  let quizStartTime = null;
  let timerInterval = null;

  function formatDuration(totalSeconds) {
    const minutes = Math.floor(totalSeconds / 60);
    const seconds = totalSeconds % 60;
    return String(minutes).padStart(2, '0') + ':' + String(seconds).padStart(2, '0');
  }

  function startTimer() {
    quizStartTime = Date.now();
    timerEl.hidden = false;
    timerEl.textContent = formatDuration(0);
    timerInterval = setInterval(() => {
      const elapsed = Math.floor((Date.now() - quizStartTime) / 1000);
      timerEl.textContent = formatDuration(elapsed);
    }, 1000);
  }

  function stopTimer() {
    if (timerInterval !== null) {
      clearInterval(timerInterval);
      timerInterval = null;
    }
  }

  function getElapsedSeconds() {
    return quizStartTime === null ? 0 : Math.floor((Date.now() - quizStartTime) / 1000);
  }

  const TOPIC_LABELS = {
    'data-sources': 'data-sources',
    'reasoning-knowledge': 'reasoning-knowledge',
    'types-of-ai': 'types-of-ai',
    'full': 'full-practice-test',
  };

  const exitModal = document.getElementById('exit-modal');

  document.getElementById('exit-btn').addEventListener('click', () => {
    exitModal.hidden = false;
  });

  document.getElementById('exit-cancel').addEventListener('click', () => {
    exitModal.hidden = true;
  });

  document.getElementById('exit-confirm').addEventListener('click', () => {
    stopTimer();
    window.location.href = 'index.html';
  });

  function progressBarText(current, total, width = 10) {
    const filled = Math.max(0, Math.min(width, Math.round((current / total) * width)));
    return '[<span class="bar-filled">' + '■'.repeat(filled) + '</span>' +
      '<span class="bar-empty">' + '□'.repeat(width - filled) + '</span>] ' + current + '/' + total;
  }

  async function init() {
    if (!topic) {
      quizArea.innerHTML = '<p>No topic specified. <a href="index.html">Back to home</a></p>';
      return;
    }

    let allQuestions;
    try {
      allQuestions = await fetchQuestions();
    } catch (e) {
      quizArea.innerHTML = '<p>Could not load questions. Make sure you are running this via a local server, not opening the file directly.</p>';
      return;
    }

    if (retryIdsParam) {
      const ids = retryIdsParam.split(',');
      const byId = new Map(allQuestions.map((q) => [q.id, q]));
      const selected = ids.map((id) => byId.get(id)).filter(Boolean);
      questions = shuffle(selected).map(shuffleChoices);
    } else {
      questions = buildQuizQuestions(allQuestions, topic);
    }

    if (questions.length === 0) {
      quizArea.innerHTML = '<p>No questions found for this selection. <a href="index.html">Back to home</a></p>';
      return;
    }

    if (isFullTest) {
      startTimer();
    }

    renderQuestion();
  }

  function renderQuestion() {
    const q = questions[currentIndex];
    progressEl.innerHTML = `${TOPIC_LABELS[topic] || topic} ${progressBarText(currentIndex + 1, questions.length)}`;
    selectedIndex = null;

    const choicesHtml = q.choices.map((choice, i) =>
      `<button class="choice-btn" data-index="${i}"><span class="choice-letter">${LETTERS[i]}</span><span>${choice}</span></button>`
    ).join('');

    quizArea.innerHTML = `
      <div class="question-card">
        <p class="question-text">${q.question}</p>
        <div class="choices" id="choices">${choicesHtml}</div>
        <div id="feedback"></div>
      </div>
      <button class="btn" id="next-btn" style="display:none;">Next</button>
    `;

    document.querySelectorAll('.choice-btn').forEach((btn) => {
      btn.addEventListener('click', () => selectAnswer(parseInt(btn.dataset.index, 10)));
    });

    document.getElementById('next-btn').addEventListener('click', goNext);
  }

  function selectAnswer(chosenIndex) {
    selectedIndex = chosenIndex;

    const q = questions[currentIndex];
    const isCorrect = chosenIndex === q.correctIndex;

    document.querySelectorAll('.choice-btn').forEach((btn) => {
      const i = parseInt(btn.dataset.index, 10);
      btn.classList.remove('correct', 'incorrect', 'selected');
      if (isFullTest) {
        if (i === chosenIndex) btn.classList.add('selected');
      } else {
        if (i === q.correctIndex) btn.classList.add('correct');
        else if (i === chosenIndex) btn.classList.add('incorrect');
      }
    });

    if (!isFullTest) {
      const feedback = document.getElementById('feedback');
      const statusLine = isCorrect
        ? `<div class="test-line pass">&#10003; PASS</div>`
        : `<div class="test-line fail">&#10007; FAIL — correct answer: ${LETTERS[q.correctIndex]}</div>`;
      feedback.innerHTML = `
        <div class="test-output">
          ${statusLine}
          <div class="test-comment"># ${q.explanation}</div>
        </div>
      `;
    }

    const nextBtn = document.getElementById('next-btn');
    nextBtn.style.display = 'block';
    nextBtn.textContent = currentIndex === questions.length - 1 ? 'See Results' : 'Next';
  }

  function goNext() {
    if (quizFinished || selectedIndex === null) return;

    const q = questions[currentIndex];
    answered.push({
      id: q.id,
      chosenIndex: selectedIndex,
      correctIndex: q.correctIndex,
      question: q.question,
      choices: q.choices,
      explanation: q.explanation,
    });

    if (currentIndex === questions.length - 1) {
      finishQuiz();
    } else {
      currentIndex++;
      renderQuestion();
    }
  }

  document.addEventListener('keydown', (e) => {
    if (!exitModal.hidden) return;
    if (questions.length === 0) return;

    const q = questions[currentIndex];
    if (!q) return;

    if (e.key === 'Enter') {
      const nextBtn = document.getElementById('next-btn');
      if (nextBtn && nextBtn.style.display !== 'none' && selectedIndex !== null) {
        e.preventDefault();
        nextBtn.click();
      }
      return;
    }

    const key = e.key.toUpperCase();
    let index = LETTERS.indexOf(key);
    if (index === -1 && e.key >= '1' && e.key <= '9') {
      index = parseInt(e.key, 10) - 1;
    }

    if (index >= 0 && index < q.choices.length) {
      const btn = document.querySelector(`.choice-btn[data-index="${index}"]`);
      if (btn) btn.click();
    }
  });

  function finishQuiz() {
    quizFinished = true;
    const { correct, total } = calculateScore(answered);
    const missed = answered.filter((a) => a.chosenIndex !== a.correctIndex);

    const attempt = {
      id: `attempt-${Date.now()}`,
      date: new Date().toISOString(),
      topic,
      score: correct,
      total,
      missed,
    };

    if (isFullTest) {
      attempt.timeTaken = getElapsedSeconds();
      stopTimer();
    }

    saveAttempt(attempt);
    sessionStorage.setItem('lastAttempt', JSON.stringify(attempt));
    window.location.href = 'results.html';
  }

  init();
</script>
</body>
</html>
