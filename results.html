<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Results — Intro to AI Study</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script src="js/theme.js"></script>
</head>
<body>
<button class="theme-toggle" id="theme-toggle" type="button"></button>
<div class="container">
  <div id="results-area"></div>
</div>

<script>
  const LETTERS = ['A', 'B', 'C', 'D', 'E', 'F'];
  const attempt = JSON.parse(sessionStorage.getItem('lastAttempt') || 'null');
  const area = document.getElementById('results-area');

  function formatDuration(totalSeconds) {
    const minutes = Math.floor(totalSeconds / 60);
    const seconds = totalSeconds % 60;
    return String(minutes).padStart(2, '0') + ':' + String(seconds).padStart(2, '0');
  }

  if (!attempt) {
    area.innerHTML = '<p>No recent attempt found. <a href="index.html">Back to home</a></p>';
  } else {
    const pct = attempt.total > 0 ? Math.round((attempt.score / attempt.total) * 100) : 0;
    const missed = attempt.missed || [];
    const timeLabel = typeof attempt.timeTaken === 'number'
      ? ` · Time: ${formatDuration(attempt.timeTaken)}`
      : '';

    const missedHtml = missed.length === 0
      ? '<p>No missed questions — great job!</p>'
      : missed.map((m) => `
        <div class="missed-question">
          <p class="question-text">${m.question}</p>
          <div class="label your-answer">Your answer</div>
          <div class="your-answer">${LETTERS[m.chosenIndex]}. ${m.choices[m.chosenIndex]}</div>
          <div class="label correct-answer">Correct answer</div>
          <div class="correct-answer">${LETTERS[m.correctIndex]}. ${m.choices[m.correctIndex]}</div>
          <div class="label"># explanation</div>
          <div>${m.explanation}</div>
        </div>
      `).join('');

    const missedIds = missed.map((m) => m.id).join(',');
    const retryBtn = missed.length > 0
      ? `<a class="btn" href="quiz.html?topic=${attempt.topic}&ids=${encodeURIComponent(missedIds)}">Retry missed questions</a>`
      : '';

    area.innerHTML = `
      <div class="score-summary">
        <div class="score-big">${attempt.score}/${attempt.total} — ${pct}%${timeLabel}</div>
      </div>
      <h2>Missed Questions</h2>
      ${missedHtml}
      <div class="actions">
        ${retryBtn}
        <a class="btn secondary" href="index.html">Back to home</a>
      </div>
    `;
  }
</script>
</body>
</html>
